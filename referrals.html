<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BNI Referrals</title>
  <style>
    :root {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      --bni-red: #dc2626;
      --text-dark: #1f2937;
      --text-light: #6b7280;
      --bg-white: #ffffff;
      --bg-light-grey: #f9fafb;
      --border-grey: #e5e7eb;
      --accent-grey: #6b7280;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      background: var(--bg-white);
      color: var(--text-dark);
      min-height: 100vh;
    }

    .setup-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
    }
    .setup-container {
      background: white;
      border-radius: 12px;
      padding: 32px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    .setup-container h1 {
      margin: 0 0 8px;
      color: var(--text-dark);
    }
    .setup-container .hint {
      margin: 0 0 24px;
      color: var(--text-light);
      font-size: 14px;
    }
    .setup-container input {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      border: 1px solid var(--border-grey);
      border-radius: 8px;
      font: inherit;
      font-size: 16px;
    }
    .setup-container input:focus-visible {
      outline: none;
      border-color: var(--bni-red);
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.14);
    }
    .setup-container button {
      width: 100%;
      padding: 12px;
      background: var(--bni-red);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .setup-container button:hover {
      background: #b91c1c;
    }
    .setup-container button:disabled {
      background: #d1d5db;
      cursor: not-allowed;
    }
    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .status.show {
      display: block;
    }
    .status.loading {
      background: #fef2f2;
      color: var(--bni-red);
    }
    .status.success {
      background: #dcfce7;
      color: #166534;
    }
    .status.error {
      background: #fee2e2;
      color: #b91c1c;
    }

    .presentation-screen {
      display: none;
      background: var(--bg-white);
      color: var(--text-dark);
      min-height: 100vh;
      width: 100%;
      padding-bottom: 60px;
    }
    .presentation-screen.active {
      display: block;
    }

    .presentation-list {
      max-width: 820px;
      margin: 0 auto;
      padding: 40px 16px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .presentation-card {
      background: var(--bg-white);
      border-radius: 16px;
      box-shadow: 0 8px 36px rgba(0,0,0,0.05), 0 1.5px 6px rgba(220,38,38,0.07);
      padding: 0;
      display: flex;
      flex-direction: column;
    }
    .presentation-content {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto auto 1fr;
      padding: 40px 60px 24px 60px;
      gap: 24px;
    }
    .presentation-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      grid-column: 1;
      grid-row: 1;
    }
    .presentation-number-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 70px;
      height: 70px;
      background: var(--bni-red);
      border-radius: 12px;
      color: white;
      font-size: 32px;
      font-weight: bold;
      box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2);
      flex-shrink: 0;
    }
    .presentation-branding {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    .bni-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--bni-red);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .bni-kent {
      font-size: 11px;
      color: var(--text-light);
    }
    .presentation-member-section {
      display: flex;
      flex-direction: column;
      gap: 4px;
      justify-content: flex-start;
      grid-row: 2;
    }
    .presentation-member {
      font-size: 42px;
      font-weight: 700;
      margin: 0;
      line-height: 1.1;
      color: var(--text-dark);
    }
    .presentation-company {
      font-size: 22px;
      color: var(--text-light);
      margin: 0;
      font-weight: 400;
    }
    .presentation-referral-section {
      grid-row: 3;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 20px;
    }
    .referral-card {
      background: var(--bg-light-grey);
      border-left: 8px solid var(--bni-red);
      padding: 40px 36px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }
    .referral-label {
      font-size: 15px;
      font-weight: 700;
      color: var(--bni-red);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 0;
    }
    .presentation-ideal-referral {
      font-size: 54px;
      color: var(--text-dark);
      margin: 0;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.5px;
      word-break: break-word;
    }
    .referral-prompt {
      font-size: 20px;
      color: var(--text-light);
      margin: 8px 0 0 0;
      font-weight: 500;
      font-style: italic;
    }
    .made-with-love {
      position: fixed;
      bottom: 0;
      right: 0;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      font-size: 12px;
      color: var(--text-light);
      pointer-events: none;
    }
    .made-with-love a {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--text-dark);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s ease;
      pointer-events: auto;
    }
    .made-with-love a:hover {
      color: var(--bni-red);
    }
    .made-with-love img {
      height: 16px;
      width: auto;
      object-fit: contain;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(220, 38, 38, 0.2);
      border-top-color: var(--bni-red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg);}
    }
    @media (max-width: 1024px) {
      .presentation-content { padding: 36px 28px 20px 28px; gap: 20px;}
      .presentation-number-badge { width: 65px; height: 65px; font-size: 30px;}
      .presentation-member { font-size: 38px;}
      .presentation-company { font-size: 20px;}
      .referral-card { padding: 36px 20px; gap: 12px;}
      .presentation-ideal-referral { font-size: 44px;}
      .referral-prompt { font-size: 18px;}
    }
    @media (max-width: 768px) {
      .presentation-list { padding: 26px 2vw 20px 2vw;}
      .presentation-content { padding: 24px 3vw 16px 3vw; gap: 16px;}
      .presentation-number-badge { width: 60px; height: 60px; font-size: 26px;}
      .bni-label { font-size: 11px;}
      .bni-kent { font-size: 10px;}
      .presentation-member { font-size: 32px;}
      .presentation-company { font-size: 16px;}
      .referral-card { padding: 22px 8px; gap: 8px;}
      .referral-label { font-size: 13px;}
      .presentation-ideal-referral { font-size: 28px;}
      .referral-prompt { font-size: 14px;}
      .made-with-love { padding: 9px 14px; font-size: 11px;}
      .made-with-love img { height: 14px;}
    }
    @media (max-width: 480px) {
      .presentation-list { padding: 14px 0 12px 0; gap: 16px;}
      .presentation-content { padding: 10px 1vw 10px 1vw; gap: 8px;}
      .presentation-number-badge { width: 45px; height: 45px; font-size: 20px;}
      .presentation-member { font-size: 20px;}
      .presentation-company { font-size: 12px;}
      .referral-card { padding: 14px 5px; gap: 2px;}
      .presentation-label, .referral-label { font-size: 9px;}
      .presentation-ideal-referral { font-size: 17px;}
      .referral-prompt { font-size: 11px;}
      .made-with-love { padding: 5px 8px; font-size: 9px;}
      .made-with-love img { height: 11px;}
    }
  </style>
</head>
<body>
  <div class="setup-screen" id="setupScreen">
    <div class="setup-container">
      <h1>📋 BNI Referrals</h1>
      <p class="hint">Paste your public Google Sheet URL to display all BNI referrals in a beautiful card view.</p>
      <input id="googleSheetUrl" type="text" placeholder="Paste public Google Sheet CSV export URL" aria-label="Google Sheet URL" />
      <p class="hint" style="font-size: 12px; margin-top: -8px;">
        ℹ️ Share your sheet as CSV: File → Export → CSV
      </p>
      <button id="loadButton" type="button">Load Referrals</button>
      <div class="status" id="status"></div>
    </div>
  </div>

  <div class="presentation-screen" id="presentationScreen">
    <div class="presentation-list" id="presentationList">
      <!-- Referral cards injected here -->
    </div>
    <!-- Made with love footer -->
    <div class="made-with-love">
      <span>Made with ❤️ by</span>
      <a href="https://thrivehomecare.co.uk" target="_blank" rel="noopener" aria-label="Visit Thrive Homecare">
        <img src="https://static.wixstatic.com/media/3cbab2_a584714b048842648b34615dd1dc792a~mv2.png/v1/fill/w_478,h_240,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/thrive-logo.png" alt="Thrive Homecare" />
        <span>Thrive Homecare</span>
      </a>
    </div>
  </div>

  <script>
    (function () {
      const setupScreen = document.getElementById('setupScreen');
      const presentationScreen = document.getElementById('presentationScreen');
      const googleSheetUrlInput = document.getElementById('googleSheetUrl');
      const loadButton = document.getElementById('loadButton');
      const status = document.getElementById('status');
      const presentationList = document.getElementById('presentationList');

      function showStatus(message, type) {
        status.textContent = message;
        status.className = `status show ${type}`;
        if (type === 'loading') {
          status.innerHTML = `<span class="spinner"></span>${message}`;
        }
      }
      function hideStatus() { status.className = 'status'; }
      function clearStatus() { status.innerHTML = ''; }

      function convertGoogleSheetUrl(url) {
        // Convert share link to CSV export URL
        const match = url.match(/\/spreadsheets\/d\/([^\/]+)/);
        if (!match) throw new Error('Invalid Google Sheet URL');
        const sheetId = match[1];
        return `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;
      }

      function parseCSV(csv) {
        const lines = csv.trim().split('\n');
        if (lines.length < 2) throw new Error('No data found in sheet');
        const headers = lines[0].split(',').map((h) => h.trim().toLowerCase());
        const numberIdx = headers.indexOf('number');
        const memberIdx = headers.indexOf('member');
        const companyIdx = headers.indexOf('company');
        const idealReferralIdx = headers.indexOf('ideal referral');

        if (numberIdx === -1 || memberIdx === -1) {
          throw new Error('Sheet must contain "number" and "member" columns');
        }

        const rows = [];
        for (let i = 1; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) continue;
          const values = line.split(',').map((v) => v.trim());
          rows.push({
            number: values[numberIdx] || '',
            member: values[memberIdx] || '',
            company: companyIdx !== -1 ? values[companyIdx] || '' : '',
            idealReferral: idealReferralIdx !== -1 ? values[idealReferralIdx] || '' : '',
          });
        }
        return rows;
      }

      function createCard(member, idx) {
        // Returns HTML string for a single card
        return `<div class="presentation-card">
        <div class="presentation-content">
          <div class="presentation-header">
            <div class="presentation-number-badge">${member.number || (idx+1)}</div>
            <div class="presentation-branding">
              <div class="bni-label">BNI</div>
              <div class="bni-kent">Kent</div>
            </div>
          </div>
          <div class="presentation-member-section">
            <h2 class="presentation-member">${member.member || 'Unknown'}</h2>
            <p class="presentation-company">${member.company || ''}</p>
          </div>
          <div class="presentation-referral-section">
            <div class="referral-card">
              <p class="referral-label">Ideal Referral</p>
              <p class="presentation-ideal-referral">${member.idealReferral || ''}</p>
              <p class="referral-prompt">Who do you know who can introduce me?</p>
            </div>
          </div>
        </div>
      </div>`;
      }

      async function loadGoogleSheet(url) {
        try {
          showStatus('Loading sheet...', 'loading');
          let csvUrl = url;
          if (url.includes('docs.google.com/spreadsheets')) {
            csvUrl = convertGoogleSheetUrl(url);
          }
          const response = await fetch(csvUrl);
          if (!response.ok) {
            throw new Error(`Failed to load sheet: ${response.statusText}`);
          }
          const csv = await response.text();
          const rows = parseCSV(csv);
          if (rows.length === 0) throw new Error('No data found in sheet');

          setTimeout(() => {
            showStatus('Loaded!', 'success');
            setTimeout(() => {
              renderReferrals(rows);
              setupScreen.style.display = 'none';
              presentationScreen.classList.add('active');
              hideStatus();
              clearStatus();
            }, 400);
          }, 200);
        } catch (error) {
          showStatus(`Error: ${error.message}`, 'error');
          loadButton.disabled = false;
        }
      }

      function renderReferrals(data) {
        // data is an array of members
        if (!Array.isArray(data) || !data.length) {
          presentationList.innerHTML = '<p style="color:var(--text-light); text-align:center; font-style:italic;">No referrals found.</p>';
        } else {
          presentationList.innerHTML = data.map((m, i) => createCard(m, i)).join('');
        }
      }

      loadButton.addEventListener('click', () => {
        const url = googleSheetUrlInput.value.trim();
        if (!url) {
          showStatus('Please enter a Google Sheet URL', 'error');
          return;
        }
        loadButton.disabled = true;
        loadGoogleSheet(url);
      });
      googleSheetUrlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') loadButton.click();
      });

      googleSheetUrlInput.focus();
    })();
  </script>
</body>
</html>
